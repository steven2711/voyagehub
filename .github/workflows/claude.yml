name: Claude Code

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      contains(github.event.comment.body || '', '@claude') ||
      contains(github.event.issue.body || '', '@claude') ||
      contains(github.event.review.body || '', '@claude')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: production
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-sonnet-4-6 --allowedTools Bash,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch"
          prompt: "Implement the changes described in this issue. When done, create a pull request with your changes."
